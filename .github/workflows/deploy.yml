name: Build and Run

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '21'

      - name: Build
        run: ./mvnw clean package -DskipTests

      - name: Restart app
        run: |
          pkill -f 'java -jar' || true
          nohup java -jar target/*.jar > app.log 2>&1 &