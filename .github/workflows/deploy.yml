name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Build JAR
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Stop old app (if running)
        run: |
          pkill -f banking || true

      - name: Start app in background (persistent on runner machine)
        run: |
          nohup java -jar target/*.jar --server.port=3500 > app.log 2>&1 &