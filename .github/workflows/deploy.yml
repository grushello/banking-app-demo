name: Build and Deploy Banking App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Corretto)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Stop old application
        run: |
          pkill -f banking || true
          pkill -f "java -jar" || true

      - name: Start application
        run: |
          setsid java -jar target/*.jar \
            --server.port=3500 \
            > app.log 2>&1 < /dev/null &